# AI 서버(DGX Spark)의 docker-compose.yml
version: '3.8'

services:
  # 1. API 접수창구 (FastAPI)
  api-server:
    build: ./api
    ports:
      - "80:8000"
    depends_on:
      - redis-queue
    environment:
      - CELERY_BROKER_URL=redis://redis-queue:6379/0

  # 2. 내부 큐 (Redis)
  redis-queue:
    image: redis:alpine
    # 포트 개방 없음 (내부에서만 사용)

  # 3. AI 합성 공장 (Celery Worker)
  ai-worker:
    build: ./ai-worker
    depends_on:
      - redis-queue
    environment:
      - CELERY_BROKER_URL=redis://redis-queue:6379/0
      - CELERY_RESULT_BACKEND=redis://redis-queue:6379/0
      - WEBHOOK_URL=http://192.168.0.5:8080/api/v1/vto/complete
      - MODEL_CACHE_DIR=/app/models
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    volumes:
      # 모델 가중치를 호스트에 캐싱하여 컨테이너 재시작 시 재다운로드 방지
      - model-cache:/app/models
    deploy:
      # 🚨 DGX Spark (GB10) - 128GB 통합 메모리 병렬 처리
      replicas: 2
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  model-cache:
    driver: local
