# AI 서버(DGX)의 docker-compose.yml
version: '3.8'

services:
  # 1. API 접수창구 (FastAPI)
  api-server:
    build: ./api
    ports:
      - "80:8000"
    # ... (FastAPI 설정)

  # 2. 내부 큐 (Redis)
  redis-queue:
    image: redis:alpine
    # 포트 개방 없음 (내부에서만 사용)

  # 3. AI 합성 공장 (Celery Worker)
  ai-worker:
    build: ./ai-worker
    depends_on:
      - redis-queue
    environment:
      - CELERY_BROKER_URL=redis://redis-queue:6379/0
      - CELERY_RESULT_BACKEND=redis://redis-queue:6379/0
      - WEBHOOK_URL=http://192.168.0.5:8080/api/v1/vto/complete
    deploy:
      # 🚨 128GB VRAM 병렬 처리를 위한 2개의 Worker Replica 
      replicas: 2
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
